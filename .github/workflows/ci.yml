name: ci

# Triggered on every push and PR targeting main.
#
# Three jobs:
#   - lint         : ruff + mypy on the runner natively (fast)
#   - test-no-bin  : runs the unit tests that don't need a real Binsec
#   - test-binsec  : runs the full suite inside the official binsec/binsec
#                    image, pinned by digest for reproducibility

on:
  push:
    # Trigger on main and any feature branch (feat/**, fix/**, etc.) so
    # the CI runs while we iterate on long-lived branches without
    # needing to open a PR every time. Tags are excluded to avoid
    # accidental double-runs on release tagging.
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
  pull_request:
    branches: [main]

# The digest of binsec/binsec:latest captured on 2026-04-28. Bumping this is
# a deliberate, audited change: review the new image with the
# "inspect-official-binsec" workflow before updating.
env:
  BINSEC_IMAGE: binsec/binsec@sha256:c50725e855a4c31aa4be04ccd1663834e1cb063ef4c66264d14431d4c65b5dcd

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev

      # Run the exact same hooks the developer runs locally on each
      # commit. If any of them rewrites a file, the job fails, telling
      # the dev to run pre-commit locally and re-push.
      - name: pre-commit (ruff lint + format + hygiene)
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: mypy
        run: uv run mypy pybinsec

  test-no-bin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run tests that don't need Binsec
        run: uv run pytest -v -m "not requires_binsec"

  test-binsec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull pinned Binsec image
        run: docker pull "$BINSEC_IMAGE"

      - name: Extract binsec binary, bundled libz3, and example artefacts
        # binsec is dynamically linked against the Z3 shared library that
        # the opam ``z3`` package builds at install time. That library is
        # newer than what Ubuntu ships, so we must copy it out alongside
        # the binary and load it via LD_LIBRARY_PATH. The path inside the
        # image was confirmed by the inspect-official-binsec workflow:
        # /home/binsec/.opam/4.14.2/lib/stublibs/libz3.so
        #
        # We also pull out:
        #   - the canonical ``magic`` quickstart binary, so integration
        #     tests reproduce the official Binsec tutorial verbatim;
        #   - the flare-on/2017.2 IgniteMe.exe and its reference
        #     crackme.ini, so we can both run the challenge and diff
        #     our pybinsec-generated script against the upstream one.
        #
        # The bitwuzla solver is needed to actually solve the flare-on
        # challenge in reasonable time. We try to extract it from the
        # image; ``|| true`` keeps the step non-fatal so older images
        # without bitwuzla still pass the magic quickstart tests.
        run: |
          mkdir -p "$HOME/binsec-bin"
          mkdir -p "$HOME/binsec-examples"
          mkdir -p "$HOME/binsec-examples/flare-on-2017.2"
          CID=$(docker create --entrypoint /bin/sh "$BINSEC_IMAGE")
          docker cp "$CID":/usr/bin/binsec "$HOME/binsec-bin/binsec"
          docker cp "$CID":/home/binsec/.opam/4.14.2/lib/stublibs/libz3.so "$HOME/binsec-bin/libz3.so"
          docker cp "$CID":/home/binsec/examples/sse/quickstart/magic "$HOME/binsec-examples/magic"
          docker cp "$CID":/home/binsec/examples/sse/flare-on/2017.2/IgniteMe.exe \
            "$HOME/binsec-examples/flare-on-2017.2/IgniteMe.exe"
          docker cp "$CID":/home/binsec/examples/sse/flare-on/2017.2/crackme.ini \
            "$HOME/binsec-examples/flare-on-2017.2/crackme.ini"
          # Best-effort bitwuzla extraction. The official image ships
          # it in /usr/local/bin per the README requirements; we also
          # try a couple of opam locations as a fallback.
          for cand in /usr/local/bin/bitwuzla /usr/bin/bitwuzla \
                      /home/binsec/.opam/4.14.2/bin/bitwuzla; do
            if docker cp "$CID":"$cand" "$HOME/binsec-bin/bitwuzla" 2>/dev/null; then
              echo "  -> bitwuzla extracted from $cand"
              chmod +x "$HOME/binsec-bin/bitwuzla"
              break
            fi
          done
          docker rm "$CID"
          chmod +x "$HOME/binsec-bin/binsec"
          chmod +x "$HOME/binsec-examples/magic"
          # Sanity check with the freshly extracted libz3 in the loader path.
          LD_LIBRARY_PATH="$HOME/binsec-bin" "$HOME/binsec-bin/binsec" -version
          if [ -x "$HOME/binsec-bin/bitwuzla" ]; then
            LD_LIBRARY_PATH="$HOME/binsec-bin" "$HOME/binsec-bin/bitwuzla" --version || true
          else
            echo "  (!) bitwuzla not available; flare-on tests will be skipped"
          fi
          echo "$HOME/binsec-bin"                                              >> "$GITHUB_PATH"
          echo "PYBINSEC_BINARY=$HOME/binsec-bin/binsec"                        >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$HOME/binsec-bin"                               >> "$GITHUB_ENV"
          echo "PYBINSEC_OFFICIAL_MAGIC=$HOME/binsec-examples/magic"             >> "$GITHUB_ENV"
          echo "PYBINSEC_OFFICIAL_FLAREON_2017_2=$HOME/binsec-examples/flare-on-2017.2/IgniteMe.exe" \
                                                                                >> "$GITHUB_ENV"
          echo "PYBINSEC_OFFICIAL_FLAREON_2017_2_INI=$HOME/binsec-examples/flare-on-2017.2/crackme.ini" \
                                                                                >> "$GITHUB_ENV"

      - name: Install runtime libs the extracted binsec needs
        # Mirrors the libs reported by ldd inside the official image:
        # libgmp10, libstdc++6, libncursesw6, libtinfo6 (all on Ubuntu 24.04
        # by default). We install explicitly to fail fast if anything moves.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgmp10 libstdc++6 libncursesw6 libtinfo6

      - name: Verify Binsec works on the runner
        run: |
          binsec -version
          binsec -help | head -5

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run full test suite (including requires_binsec tests)
        run: uv run pytest -v
