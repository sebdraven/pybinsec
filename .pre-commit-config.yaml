# Pre-commit hooks: run "uv run pre-commit install" once after cloning,
# then every "git commit" runs these checks against the staged files.
#
# To run the same checks the CI runs, against every file in the repo:
#     uv run pre-commit run --all-files
#
# To bump the hook versions when new releases come out:
#     uv run pre-commit autoupdate

repos:
  # Generic hygiene: trailing whitespace, missing newlines, broken YAML, etc.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
        args: [--fix=lf]

  # Lint + format with ruff. Two hooks: ruff (lint, with auto-fix) and
  # ruff-format (Python formatter). Same tool the CI runs, just earlier.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
